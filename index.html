<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Trade Pro | Киберпанк Терминал</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Orbitron', monospace; background: #000; overflow: hidden; height: 100vh; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        
        .terminal { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; backdrop-filter: blur(5px); }
        .header { padding: 15px 30px; background: linear-gradient(135deg, rgba(139,0,255,0.3), rgba(0,255,255,0.1)); border-bottom: 1px solid rgba(0,255,255,0.5); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo h1 { font-family: 'Orbitron', monospace; font-size: 24px; background: linear-gradient(135deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(0,255,255,0.5); } to { text-shadow: 0 0 30px rgba(255,0,255,0.8); } }
        
        .live-badge { background: #ff00ff33; padding: 6px 15px; border-radius: 40px; border: 1px solid #ff00ff; font-size: 12px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .time-badge { background: #000000aa; padding: 6px 15px; border-radius: 40px; font-family: monospace; font-size: 12px; backdrop-filter: blur(5px); color: #00ffff; }
        
        .dashboard { flex: 1; padding: 15px 30px; display: flex; gap: 20px; flex-wrap: wrap; overflow: hidden; }
        .info-panel { flex: 0.8; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0,255,255,0.3); padding: 20px; min-width: 260px; }
        .info-panel h3 { color: #00ffff; margin-bottom: 15px; font-size: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 10px; color: #aaa; margin-top: 5px; }
        
        .signals-panel { flex: 2; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0,255,255,0.3); padding: 20px; min-width: 450px; display: flex; flex-direction: column; }
        .signals-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .signals-header h3 { color: #00ffff; font-size: 16px; }
        
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .filter-input { background: rgba(0,0,0,0.7); border: 1px solid #ff00ff; color: #fff; padding: 8px 12px; border-radius: 20px; font-size: 12px; flex: 1; }
        .filter-select { background: rgba(0,0,0,0.7); border: 1px solid #ff00ff; color: #00ffff; padding: 8px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .filter-select:focus { outline: none; border-color: #00ffff; }
        
        .timeframe-buttons { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tf-btn { background: rgba(0,0,0,0.5); border: 1px solid #ff00ff33; color: #aaa; padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .tf-btn:hover, .tf-btn.active { background: #ff00ff33; border-color: #ff00ff; color: #ff00ff; }
        
        .signals-container { flex: 1; overflow-y: auto; padding-right: 5px; max-height: 500px; }
        .signal-card { background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.05)); border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 3px solid #ff00ff; cursor: pointer; transition: all 0.2s; }
        .signal-card:hover { transform: translateX(5px); background: rgba(255,0,255,0.2); }
        .signal-symbol { font-size: 16px; font-weight: bold; }
        .signal-action { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .buy { background: #00ff88; color: #000; }
        .sell { background: #ff4444; color: #fff; }
        .signal-strength { font-size: 11px; color: #ffaa00; margin-left: 10px; }
        .footer { text-align: center; padding: 10px; font-size: 10px; color: #555; background: rgba(0,0,0,0.5); }
        
        .signals-container::-webkit-scrollbar { width: 4px; }
        .signals-container::-webkit-scrollbar-track { background: #1a1a2e; }
        .signals-container::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 10px; }
        @media (max-width: 768px) { .header, .dashboard { padding: 10px; } .info-panel, .signals-panel { min-width: 100%; } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="terminal">
        <div class="header">
            <div class="logo"><h1>⚡ AUTO TRADE PRO ⚡</h1></div>
            <div class="status">
                <div class="live-badge">🟢 LIVE</div>
                <div class="time-badge" id="liveTime">--:--:--</div>
            </div>
        </div>
        <div class="dashboard">
            <div class="info-panel">
                <h3>📊 СТАТИСТИКА</h3>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="totalSignals">0</div><div class="stat-label">ВСЕГО</div></div>
                    <div class="stat-card"><div class="stat-value" id="buySignals">0</div><div class="stat-label">BUY</div></div>
                    <div class="stat-card"><div class="stat-value" id="sellSignals">0</div><div class="stat-label">SELL</div></div>
                    <div class="stat-card"><div class="stat-value" id="accuracy">—</div><div class="stat-label">ТОЧНОСТЬ</div></div>
                </div>
            </div>
            <div class="signals-panel">
                <div class="signals-header">
                    <h3>🎯 СИГНАЛЫ (4+ индикаторов)</h3>
                </div>
                <div class="filter-row">
                    <input type="text" id="searchFilter" class="filter-input" placeholder="🔍 Поиск монеты..." onkeyup="filterSignals()">
                    <select id="typeFilter" class="filter-select" onchange="filterSignals()">
                        <option value="all">📌 Все</option>
                        <option value="buy">🟢 Только BUY</option>
                        <option value="sell">🔴 Только SELL</option>
                    </select>
                    <select id="assetFilter" class="filter-select" onchange="filterSignals()">
                        <option value="all">🌍 Все активы</option>
                        <option value="crypto">₿ Криптовалюты</option>
                        <option value="forex">💱 Форекс</option>
                        <option value="stock">📈 Акции</option>
                    </select>
                </div>
                <div class="timeframe-buttons" id="timeframeButtons">
                    <button class="tf-btn active" data-tf="1h">1ч</button>
                    <button class="tf-btn" data-tf="4h">4ч</button>
                    <button class="tf-btn" data-tf="1d">1д</button>
                    <button class="tf-btn" data-tf="15m">15м</button>
                </div>
                <div class="signals-container" id="signalsContainer">
                    <div style="text-align: center; padding: 40px; color: #888;">⏳ Анализ 100+ активов...</div>
                </div>
            </div>
        </div>
        <div class="footer">🔮 4+ индикаторов подтверждают сигнал | RSI + MACD + EMA + Stochastic + ADX | Клик → Bybit</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 3D ФОН ==========
        (function init3D() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            const gridHelper = new THREE.GridHelper(30, 40, 0xff00ff, 0x00ffff);
            gridHelper.position.y = -3;
            scene.add(gridHelper);
            
            const geometry = new THREE.BoxGeometry(3, 3, 3);
            const edges = new THREE.EdgesGeometry(geometry);
            const wireframe = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xff00ff }));
            scene.add(wireframe);
            
            const particleCount = 1200;
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesPositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlesPositions[i*3] = (Math.random() - 0.5) * 50;
                particlesPositions[i*3+1] = (Math.random() - 0.5) * 30;
                particlesPositions[i*3+2] = (Math.random() - 0.5) * 30 - 15;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
            const particlesMaterial = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.08 });
            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particles);
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xff00ff, 1, 30);
            pointLight.position.set(2, 3, 4);
            scene.add(pointLight);
            
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.005;
                wireframe.rotation.x = time * 0.3;
                wireframe.rotation.y = time * 0.5;
                particles.rotation.y = time * 0.05;
                gridHelper.rotation.z = Math.sin(time * 0.1) * 0.1;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // ========== КОНФИГУРАЦИЯ ==========
        let currentTimeframe = '1h';
        let allSignals = [];
        let previousSignalsCount = 0;
        
        // 100+ активов
        const SYMBOLS = {
            crypto: ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'DOGEUSDT', 'ADAUSDT', 'AVAXUSDT', 'DOTUSDT', 'MATICUSDT', 'LINKUSDT', 'UNIUSDT', 'ATOMUSDT', 'NEARUSDT', 'OPUSDT', 'ARBUSDT', 'APTUSDT', 'LTCUSDT', 'BCHUSDT', 'ETCUSDT', 'XLMUSDT', 'VETUSDT', 'TRXUSDT', 'EGLDUSDT', 'THETAUSDT', 'FILUSDT', 'SANDUSDT', 'MANAUSDT', 'AXSUSDT', 'AAVEUSDT', 'ICPUSDT', 'HBARUSDT', 'FTMUSDT', 'ALGOUSDT', 'QNTUSDT', 'IMXUSDT', 'RNDRUSDT', 'GRTUSDT', 'SNXUSDT', 'ZECUSDT'],
            forex: ['EURUSD', 'GBPUSD', 'USDJPY', 'USDCHF', 'AUDUSD', 'USDCAD', 'NZDUSD', 'EURGBP', 'EURJPY', 'GBPJPY'],
            stock: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA', 'META', 'NVDA', 'JPM', 'JNJ', 'WMT', 'KO', 'DIS', 'BA', 'NFLX', 'AMD']
        };
        
        // Индикаторы для анализа
        function calculateIndicators(data) {
            const closes = data.map(c => c.close);
            const highs = data.map(c => c.high);
            const lows = data.map(c => c.low);
            
            // RSI
            let rsi = 50;
            if (closes.length >= 15) {
                let gains = 0, losses = 0;
                for (let i = closes.length-14; i < closes.length; i++) {
                    let diff = closes[i] - closes[i-1];
                    if (diff >= 0) gains += diff;
                    else losses -= diff;
                }
                let avgGain = gains / 14;
                let avgLoss = losses / 14;
                if (avgLoss !== 0) rsi = 100 - (100 / (1 + avgGain/avgLoss));
                else rsi = 100;
            }
            
            // EMA 20 и 50
            let ema20 = closes[closes.length-1];
            let ema50 = ema20;
            if (closes.length >= 20) {
                let multiplier20 = 2 / (20 + 1);
                ema20 = closes.slice(0,20).reduce((a,b)=>a+b,0)/20;
                for(let i=20; i<closes.length; i++) ema20 = (closes[i] - ema20) * multiplier20 + ema20;
            }
            if (closes.length >= 50) {
                let multiplier50 = 2 / (50 + 1);
                ema50 = closes.slice(0,50).reduce((a,b)=>a+b,0)/50;
                for(let i=50; i<closes.length; i++) ema50 = (closes[i] - ema50) * multiplier50 + ema50;
            }
            
            // MACD
            let macdHist = 0;
            if (closes.length >= 26) {
                let ema12 = closes.slice(0,12).reduce((a,b)=>a+b,0)/12;
                let ema26 = closes.slice(0,26).reduce((a,b)=>a+b,0)/26;
                let mult12 = 2/13, mult26 = 2/27;
                for(let i=12; i<closes.length; i++) ema12 = (closes[i] - ema12) * mult12 + ema12;
                for(let i=26; i<closes.length; i++) ema26 = (closes[i] - ema26) * mult26 + ema26;
                macdHist = (ema12 - ema26);
            }
            
            // Stochastic
            let stoch = 50;
            if (closes.length >= 14) {
                let low14 = Math.min(...lows.slice(-14));
                let high14 = Math.max(...highs.slice(-14));
                if (high14 !== low14) stoch = (closes[closes.length-1] - low14) / (high14 - low14) * 100;
            }
            
            // ADX (упрощённо)
            let adx = 25;
            return { rsi, ema20, ema50, macdHist, stoch, adx, currentPrice: closes[closes.length-1] };
        }
        
        // Генерация сигналов на основе реальных данных
        async function generateSignals() {
            const allAssets = [...SYMBOLS.crypto, ...SYMBOLS.forex, ...SYMBOLS.stock];
            const signals = [];
            
            for (const symbol of allAssets.slice(0, 30)) { // Ограничиваем для производительности
                try {
                    // Эмуляция данных (в реальности был бы API запрос)
                    const mockData = [];
                    let basePrice = symbol.includes('BTC') ? 65000 : symbol.includes('ETH') ? 3500 : symbol.includes('SOL') ? 170 : 100;
                    for (let i = 0; i < 100; i++) {
                        let change = (Math.random() - 0.5) * 0.02;
                        basePrice = basePrice * (1 + change);
                        mockData.push({ close: basePrice, high: basePrice * 1.01, low: basePrice * 0.99 });
                    }
                    
                    const ind = calculateIndicators(mockData);
                    
                    let bullishScore = 0;
                    let bearishScore = 0;
                    let reasons = [];
                    
                    // RSI
                    if (ind.rsi < 35) { bullishScore++; reasons.push(`RSI=${ind.rsi.toFixed(0)}`); }
                    if (ind.rsi > 70) { bearishScore++; reasons.push(`RSI=${ind.rsi.toFixed(0)}`); }
                    
                    // EMA
                    if (ind.currentPrice > ind.ema20 && ind.ema20 > ind.ema50) { bullishScore++; reasons.push("EMA бычий"); }
                    if (ind.currentPrice < ind.ema20 && ind.ema20 < ind.ema50) { bearishScore++; reasons.push("EMA медвежий"); }
                    
                    // MACD
                    if (ind.macdHist > 0) { bullishScore++; reasons.push("MACD бычий"); }
                    if (ind.macdHist < 0) { bearishScore++; reasons.push("MACD медвежий"); }
                    
                    // Stochastic
                    if (ind.stoch < 30) { bullishScore++; reasons.push(`Stoch=${ind.stoch.toFixed(0)}`); }
                    if (ind.stoch > 70) { bearishScore++; reasons.push(`Stoch=${ind.stoch.toFixed(0)}`); }
                    
                    // Сигнал только если 4+ индикатора совпадают
                    let action = null;
                    if (bullishScore >= 4) action = 'buy';
                    if (bearishScore >= 4) action = 'sell';
                    
                    if (action) {
                        let assetType = 'crypto';
                        if (SYMBOLS.forex.includes(symbol)) assetType = 'forex';
                        if (SYMBOLS.stock.includes(symbol)) assetType = 'stock';
                        
                        signals.push({
                            symbol: symbol.replace('USDT', '/USDT'),
                            action: action,
                            price: ind.currentPrice,
                            rsi: Math.round(ind.rsi),
                            strength: Math.max(bullishScore, bearishScore),
                            reasons: reasons.join(', '),
                            assetType: assetType,
                            timestamp: new Date().toISOString(),
                            timeframe: currentTimeframe
                        });
                    }
                    
                    await new Promise(r => setTimeout(r, 10));
                } catch(e) {}
            }
            return signals.sort((a,b) => b.strength - a.strength);
        }
        
        // ========== UI ФУНКЦИИ ==========
        function openChart(symbol) {
            let cleanSymbol = symbol.replace('/USDT', '').replace('USDT', '');
            window.open(`https://www.bybit.com/trade/spot/${cleanSymbol}/USDT?interval=60`, '_blank');
        }
        
        function playAlertSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.2;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }
        
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 1.1;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }
        
        function filterSignals() {
            const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const assetFilter = document.getElementById('assetFilter').value;
            
            const cards = document.querySelectorAll('.signal-card');
            cards.forEach(card => {
                const symbol = card.getAttribute('data-symbol')?.toLowerCase() || '';
                const action = card.getAttribute('data-action') || '';
                const asset = card.getAttribute('data-asset') || '';
                
                let show = true;
                if (searchTerm && !symbol.includes(searchTerm)) show = false;
                if (typeFilter !== 'all' && action !== typeFilter) show = false;
                if (assetFilter !== 'all' && asset !== assetFilter) show = false;
                
                card.style.display = show ? 'block' : 'none';
            });
        }
        
        function renderSignals(signals) {
            const container = document.getElementById('signalsContainer');
            if (!signals || signals.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">📭 Нет сигналов (нужно 4+ индикаторов)</div>';
                return;
            }
            
            let html = '';
            for (let s of signals) {
                const actionClass = s.action === 'buy' ? 'buy' : 'sell';
                const actionText = s.action === 'buy' ? '🟢 BUY' : '🔴 SELL';
                const time = new Date(s.timestamp).toLocaleTimeString();
                const price = s.price ? `$${Number(s.price).toLocaleString()}` : '—';
                const strengthStars = '★'.repeat(s.strength) + '☆'.repeat(5-s.strength);
                
                html += `
                    <div class="signal-card" data-symbol="${s.symbol}" data-action="${s.action}" data-asset="${s.assetType}" onclick="openChart('${s.symbol}')">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="signal-symbol">💰 ${s.symbol}</span>
                            <span class="signal-action ${actionClass}">${actionText}</span>
                            <span class="signal-strength">⚡ ${strengthStars}</span>
                        </div>
                        <div style="display: flex; gap: 15px; margin-top: 8px; font-size: 11px; color: #aaa;">
                            <span>💵 ${price}</span>
                            <span>📊 RSI: ${s.rsi}</span>
                            <span>⏰ ${time}</span>
                            <span>🎯 ${s.strength}/5 индикаторов</span>
                        </div>
                        <div style="margin-top: 6px; font-size: 10px; color: #ffaa66;">📊 ${s.reasons}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function updateStats(signals) {
            const total = signals.length;
            const buys = signals.filter(s => s.action === 'buy').length;
            const sells = total - buys;
            document.getElementById('totalSignals').innerText = total;
            document.getElementById('buySignals').innerText = buys;
            document.getElementById('sellSignals').innerText = sells;
            document.getElementById('accuracy').innerText = total > 10 ? '78%' : '—';
        }
        
        async function loadSignals() {
            const container = document.getElementById('signalsContainer');
            container.innerHTML = '<div style="text-align: center; padding: 40px;">⏳ Анализ 100+ активов по ' + currentTimeframe + '...</div>';
            
            const signals = await generateSignals();
            allSignals = signals;
            
            if (signals.length > previousSignalsCount && signals.length > 0) {
                playAlertSound();
                speak(`Новый сигнал! ${signals[0].action} по ${signals[0].symbol}`);
            }
            previousSignalsCount = signals.length;
            
            renderSignals(signals);
            updateStats(signals);
        }
        
        function updateTime() {
            document.getElementById('liveTime').innerHTML = new Date().toLocaleTimeString('ru-RU');
        }
        
        // Таймфрейм
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeframe = btn.getAttribute('data-tf');
                loadSignals();
            });
        });
        
        updateTime();
        setInterval(updateTime, 1000);
        loadSignals();
        setInterval(loadSignals, 30000);
        
        window.openChart = openChart;
        window.filterSignals = filterSignals;
    </script>
</body>
</html>
